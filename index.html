<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>每日康复练习</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1f2933; --sub:#7b8794;
    --accent:#3a8fd6; --accent-d:#2f73ad; --done:#43b97f; --line:#e4e8ee;
    --shadow:0 2px 10px rgba(30,50,80,.07);
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--ink); padding:16px 14px 86px; max-width:560px; margin:0 auto;
    -webkit-font-smoothing:antialiased;
  }
  header{ margin-bottom:14px; }
  .date{ font-size:13px; color:var(--sub); }
  h1{ font-size:22px; font-weight:700; margin-top:2px; }
  .view{ display:none; } .view.active{ display:block; }

  .progress-wrap{ background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow); margin-bottom:14px; }
  .progress-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .progress-label{ font-size:14px; color:var(--sub); }
  .progress-count{ font-size:15px; font-weight:600; }
  .bar{ height:12px; background:#e9eef4; border-radius:99px; overflow:hidden; }
  .bar-fill{ height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--done)); border-radius:99px; transition:width .4s ease; }
  .all-done{ text-align:center; color:var(--done); font-weight:600; font-size:15px; margin-top:12px; display:none; }
  .est{ text-align:center; font-size:13px; color:var(--sub); margin-top:10px; }

  .start-guide{ width:100%; padding:15px; border:none; border-radius:14px; background:var(--accent); color:#fff;
    font-size:16px; font-weight:700; cursor:pointer; box-shadow:var(--shadow); margin-bottom:16px; }
  .start-guide:active{ background:var(--accent-d); }

  .ex{ background:var(--card); border-radius:16px; box-shadow:var(--shadow); margin-bottom:14px; overflow:hidden; transition:opacity .3s; }
  .ex.done{ opacity:.62; }
  .ex-head{ display:flex; align-items:center; padding:14px 16px; gap:12px; cursor:pointer; }
  .check{ flex:0 0 30px; width:30px; height:30px; border-radius:50%; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; transition:all .2s; background:#fff; }
  .ex.done .check{ background:var(--done); border-color:var(--done); }
  .check svg{ width:16px; height:16px; opacity:0; transition:opacity .2s; }
  .ex.done .check svg{ opacity:1; }
  .ex-info{ flex:1; min-width:0; }
  .ex-name{ font-size:17px; font-weight:600; }
  .ex.done .ex-name{ text-decoration:line-through; color:var(--sub); }
  .ex-meta{ font-size:13px; color:var(--sub); margin-top:2px; }
  .chev{ flex:0 0 auto; color:var(--sub); transition:transform .25s; }
  .ex.open .chev{ transform:rotate(180deg); }

  .ex-body{ max-height:0; overflow:hidden; transition:max-height .35s ease; }
  .ex.open .ex-body{ max-height:760px; }
  .ex-body-inner{ padding:0 16px 16px; border-top:1px solid var(--line); }
  .pose{ display:block; width:100%; max-width:240px; margin:14px auto 4px; }
  .pose line, .pose path, .pose circle{ stroke:var(--accent); stroke-width:3.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .pose .floor{ stroke:#d3dbe4; stroke-width:2.4; }
  .ex-desc{ font-size:14px; line-height:1.6; color:#52606d; padding-top:8px; }
  .media{ display:flex; gap:10px; margin:12px 0 2px; }
  .media a{ flex:1; text-align:center; padding:9px 6px; border-radius:10px; background:#eef4fa; color:var(--accent-d); font-size:13px; font-weight:600; text-decoration:none; }
  .media a:active{ background:#dde9f5; }

  .tools{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
  .tool{ flex:1; min-width:130px; background:#f5f8fb; border-radius:12px; padding:12px; text-align:center; }
  .tool-label{ font-size:12px; color:var(--sub); margin-bottom:8px; }
  .counter-row{ display:flex; align-items:center; justify-content:center; gap:14px; }
  .cbtn{ width:36px; height:36px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:20px; font-weight:600; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .cbtn:active{ background:var(--accent-d); }
  .cval{ font-size:20px; font-weight:700; min-width:52px; }
  .cval small{ font-size:13px; color:var(--sub); font-weight:500; }

  .timer-val{ font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; margin-bottom:8px; }
  .tbtns{ display:flex; gap:8px; justify-content:center; }
  .tbtn{ padding:7px 16px; border-radius:9px; border:none; font-size:14px; font-weight:600; cursor:pointer; background:var(--accent); color:#fff; }
  .tbtn.ghost{ background:#e4ebf2; color:var(--ink); }
  .tbtn:active{ opacity:.8; }

  .done-btn{ width:100%; margin-top:14px; padding:13px; border-radius:12px; border:none; background:var(--done); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
  .ex.done .done-btn{ background:#e4ebf2; color:var(--sub); }

  /* plan page */
  .plan-row{ background:var(--card); border-radius:14px; box-shadow:var(--shadow); padding:12px 14px; margin-bottom:12px; }
  .plan-top{ display:flex; align-items:center; gap:10px; }
  .plan-name{ flex:1; font-size:15px; font-weight:600; line-height:1.3; }
  .plan-type{ font-size:12px; color:var(--sub); font-weight:400; margin-top:2px; }
  .mv{ display:flex; flex-direction:column; gap:4px; }
  .mv button{ width:30px; height:24px; border:none; border-radius:7px; background:#eef2f7; color:var(--accent); font-size:12px; cursor:pointer; }
  .mv button:active{ background:#dde6ef; }
  .mv button:disabled{ opacity:.3; cursor:default; }
  .plan-edit{ display:flex; gap:18px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .pe-group{ display:flex; align-items:center; gap:10px; }
  .pe-group .lbl{ font-size:13px; color:var(--sub); }
  .pe-val{ font-size:18px; font-weight:700; min-width:26px; text-align:center; }
  .sbtn{ width:32px; height:32px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:18px; font-weight:600; cursor:pointer; }
  .sbtn:active{ background:var(--accent-d); }
  .plan-actions{ text-align:center; margin-top:6px; }
  .plan-note{ font-size:12px; color:var(--sub); text-align:center; margin-bottom:14px; }

  /* progress page */
  .stats{ display:flex; gap:10px; margin-bottom:16px; }
  .stat{ flex:1; background:var(--card); border-radius:14px; box-shadow:var(--shadow); padding:14px 8px; text-align:center; }
  .stat .num{ font-size:26px; font-weight:800; color:var(--accent); }
  .stat .lbl{ font-size:12px; color:var(--sub); margin-top:3px; }
  .cal-card{ background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:16px; }
  .cal-title{ font-size:14px; font-weight:600; margin-bottom:12px; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-h{ font-size:11px; color:var(--sub); text-align:center; padding-bottom:2px; }
  .cell{ aspect-ratio:1; border-radius:7px; background:#e9eef4; display:flex; align-items:center; justify-content:center; font-size:11px; color:#9aa7b4; }
  .cell.today{ outline:2px solid var(--accent); outline-offset:-2px; }
  .cell.empty{ background:transparent; }
  .legend{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; font-size:11px; color:var(--sub); }
  .legend i{ width:14px; height:14px; border-radius:4px; display:inline-block; }

  footer{ text-align:center; font-size:12px; color:var(--sub); margin-top:20px; }
  .reset{ background:none; border:none; color:var(--accent); font-size:13px; cursor:pointer; text-decoration:underline; margin-top:6px; }

  /* bottom nav */
  .nav{ position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    display:flex; max-width:560px; margin:0 auto; z-index:40; padding-bottom:env(safe-area-inset-bottom); }
  .nav button{ flex:1; padding:9px 0 12px; background:none; border:none; font-size:11px; color:var(--sub); cursor:pointer; }
  .nav button.active{ color:var(--accent); font-weight:700; }
  .nav .ic{ display:block; font-size:20px; margin-bottom:1px; }

  /* guided overlay */
  .overlay{ position:fixed; inset:0; background:rgba(244,246,249,.97); z-index:60; display:none; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; text-align:center; }
  .overlay.show{ display:flex; }
  .g-step{ font-size:14px; color:var(--sub); margin-bottom:6px; }
  .g-name{ font-size:26px; font-weight:800; margin-bottom:4px; }
  .g-sub{ font-size:15px; color:var(--sub); margin-bottom:16px; }
  .g-pose{ width:80%; max-width:300px; margin-bottom:18px; }
  .g-count{ font-size:64px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1; min-height:64px; }
  .g-set{ font-size:15px; color:var(--sub); margin-top:6px; margin-bottom:22px; }
  .g-btns{ display:flex; gap:12px; }
  .g-btns button{ padding:12px 18px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer; }
  .g-pause{ background:var(--accent); color:#fff; }
  .g-skip{ background:#e4ebf2; color:var(--ink); }
  .g-stop{ background:#f0d3d3; color:#9b3b3b; }
</style>
</head>
<body>
<header>
  <div class="date" id="today"></div>
  <h1 id="vtitle">今日康复练习 🧘</h1>
</header>

<!-- 今天 -->
<div class="view active" id="view-today">
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">完成进度</span>
      <span class="progress-count" id="pcount">0 / 0</span>
    </div>
    <div class="bar"><div class="bar-fill" id="pfill"></div></div>
    <div class="est" id="estLine"></div>
    <div class="all-done" id="alldone">🎉 太棒了，今天全部完成！</div>
  </div>
  <button class="start-guide" id="startGuide">▶ 开始语音引导（自动带你做完）</button>
  <div id="list"></div>
  <footer>
    跟着你的物理治疗师安排，慢慢来 💙<br>
    <button class="reset" id="resetBtn">重置今天的打卡</button>
  </footer>
</div>

<!-- 计划 -->
<div class="view" id="view-plan">
  <div class="plan-note">用 ▲▼ 调整顺序，用 + / − 改每个动作的组数和次数。改动会自动保存。</div>
  <div class="plan-note" id="planTotal" style="margin-top:-8px;font-weight:700;color:var(--accent-d)"></div>
  <div id="planList"></div>
  <div class="plan-actions"><button class="reset" id="planReset">恢复默认计划</button></div>
</div>

<!-- 进度 -->
<div class="view" id="view-progress">
  <div class="stats">
    <div class="stat"><div class="num" id="stStreak">0</div><div class="lbl">连续全勤天数</div></div>
    <div class="stat"><div class="num" id="stMonth">0</div><div class="lbl">本月打卡</div></div>
    <div class="stat"><div class="num" id="stTotal">0</div><div class="lbl">累计打卡</div></div>
  </div>
  <div class="cal-card">
    <div class="cal-title">最近 5 周</div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="legend">
      <span>少</span>
      <i style="background:#e9eef4"></i>
      <i style="background:rgba(58,143,214,.45)"></i>
      <i style="background:rgba(58,143,214,.8)"></i>
      <i style="background:#43b97f"></i>
      <span>全部完成</span>
    </div>
  </div>
</div>

<nav class="nav">
  <button data-view="today" class="active"><span class="ic">📋</span>今天</button>
  <button data-view="plan"><span class="ic">⚙️</span>计划</button>
  <button data-view="progress"><span class="ic">📈</span>进度</button>
</nav>

<div class="overlay" id="overlay">
  <div class="g-step" id="gStep"></div>
  <div class="g-name" id="gName"></div>
  <div class="g-sub" id="gSub"></div>
  <div class="g-pose" id="gPose"></div>
  <div class="g-count" id="gCount"></div>
  <div class="g-set" id="gSet"></div>
  <div class="g-btns">
    <button class="g-pause" id="gPause">暂停</button>
    <button class="g-skip" id="gSkip">跳过</button>
    <button class="g-stop" id="gStop">结束</button>
  </div>
</div>

<script>
const BASE = [
  { id:'birddog', name:'Bird Dog', sets:2, reps:10, type:'reps', repSecs:3,
    cue:'伸出对侧手脚，背部保持平直。',
    desc:'四点跪姿（手在肩下、膝在髋下）。收紧核心，同时伸出对侧的手臂和腿，保持身体稳定不晃动，背部成一条直线。停顿 1–2 秒后收回，换边。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><line x1="68" y1="50" x2="106" y2="50"/><circle cx="116" cy="48" r="7"/><line x1="106" y1="50" x2="106" y2="84"/><line x1="68" y1="50" x2="58" y2="84"/><line x1="106" y1="50" x2="142" y2="34"/><line x1="68" y1="50" x2="34" y2="36"/></svg>` },
  { id:'happybaby', name:'Happy Baby', sets:1, reps:3, type:'hold', holdSecs:25,
    cue:'抓住双脚，轻轻把膝盖拉向腋下。',
    desc:'仰卧，双膝弯向胸口，双手抓住脚的外侧或脚踝，轻轻将膝盖往腋下方向拉，放松下背和髋部。每次保持 20–30 秒，深呼吸。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><circle cx="34" cy="76" r="7"/><line x1="42" y1="78" x2="80" y2="74"/><line x1="80" y1="74" x2="96" y2="44"/><line x1="96" y1="44" x2="86" y2="34"/><line x1="80" y1="74" x2="70" y2="46"/><line x1="70" y1="46" x2="62" y2="36"/><line x1="56" y1="76" x2="86" y2="36"/></svg>` },
  { id:'breathing', name:'Diaphragmatic Breathing（腹式呼吸）', sets:2, reps:10, type:'reps', repSecs:5,
    cue:'鼻子吸气让肚子鼓起，嘴巴慢慢呼气。',
    desc:'仰卧或坐姿，一只手放胸口一只手放肚子。用鼻子慢慢吸气，让肚子鼓起（胸口尽量不动），再缓缓用嘴呼气让肚子回落。每一次完整吸呼算一下。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><circle cx="26" cy="74" r="7"/><line x1="33" y1="78" x2="118" y2="78"/><line x1="118" y1="78" x2="132" y2="60"/><line x1="60" y1="78" x2="64" y2="64"/><line x1="92" y1="78" x2="96" y2="62"/><path d="M70 50 q14 -14 28 0"/></svg>` },
  { id:'childpose', name:"Child's Pose Side Stretch（婴儿式侧拉伸）", sets:1, reps:3, type:'hold', holdSecs:25,
    cue:'趴下后双手向一侧伸展，感受体侧拉伸。',
    desc:'跪坐后臀部坐向脚跟，双手向前伸展趴下成婴儿式。然后双手一起慢慢移向左侧，感受右侧身体的拉伸，保持 20–30 秒，再换另一侧。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><path d="M96 84 q4 -22 18 -22"/><line x1="96" y1="84" x2="96" y2="70"/><line x1="114" y1="62" x2="60" y2="74"/><line x1="60" y1="74" x2="30" y2="80"/><circle cx="50" cy="72" r="6"/></svg>` },
  { id:'squats', name:'Squats（深蹲）', sets:2, reps:10, type:'reps', repSecs:3,
    cue:'臀部向后向下坐，膝盖不要内扣。',
    desc:'双脚与肩同宽、脚尖略朝外。臀部向后向下坐，像要坐到椅子上，膝盖跟脚尖同方向、不要内扣，下蹲到大腿接近与地面平行，再用脚跟发力站起。全程挺胸、收紧核心。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="92" x2="152" y2="92"/><circle cx="80" cy="22" r="8"/><line x1="80" y1="30" x2="80" y2="54"/><line x1="80" y1="54" x2="58" y2="60"/><line x1="58" y1="60" x2="62" y2="92"/><line x1="80" y1="54" x2="102" y2="60"/><line x1="102" y1="60" x2="98" y2="92"/><line x1="80" y1="38" x2="108" y2="44"/></svg>` },
  { id:'sumosquat', name:'Sumo Squat（相扑深蹲）', sets:2, reps:10, type:'reps', repSecs:3,
    cue:'双脚宽站、脚尖朝外，膝盖顺脚尖方向打开。',
    desc:'双脚比肩略宽，脚尖明显朝外约 45°。臀部下沉做深蹲，膝盖顺着脚尖方向打开，感受大腿内侧发力，再站起、轻轻夹紧臀部。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="92" x2="152" y2="92"/><circle cx="80" cy="22" r="8"/><line x1="80" y1="30" x2="80" y2="52"/><line x1="80" y1="52" x2="50" y2="64"/><line x1="50" y1="64" x2="40" y2="92"/><line x1="80" y1="52" x2="110" y2="64"/><line x1="110" y1="64" x2="120" y2="92"/><line x1="80" y1="40" x2="58" y2="56"/><line x1="80" y1="40" x2="102" y2="56"/></svg>` },
  { id:'clamshells', name:'Clamshells（蚌式开合）', sets:2, reps:10, type:'reps', repSecs:3,
    cue:'脚跟并拢，上面的膝盖像蚌壳一样往上打开。',
    desc:'侧躺，双膝弯曲叠放、脚跟并拢。保持骨盆稳定不后倒，像蚌壳一样把上面的膝盖向上打开，感受臀部外侧发力，再缓慢合回。做完一侧换边。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><circle cx="120" cy="58" r="7"/><line x1="114" y1="62" x2="74" y2="74"/><line x1="74" y1="74" x2="54" y2="60"/><line x1="54" y1="60" x2="40" y2="74"/><line x1="74" y1="74" x2="56" y2="80"/><line x1="56" y1="80" x2="40" y2="74"/></svg>` },
  { id:'hipadduction', name:'Side Lying Hip Adduction（侧卧髋内收）', sets:2, reps:10, type:'reps', repSecs:3,
    cue:'上腿跨到前方，把下面伸直的腿向上抬。',
    desc:'侧躺，下面那条腿伸直，上面那条腿屈膝跨到身体前方着地。把下面伸直的腿向上抬起，感受大腿内侧发力，再缓慢放下。做完一侧换边。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><circle cx="120" cy="56" r="7"/><line x1="114" y1="60" x2="74" y2="70"/><line x1="74" y1="70" x2="44" y2="76"/><line x1="74" y1="70" x2="64" y2="84"/><line x1="64" y1="84" x2="84" y2="84"/></svg>` },
  { id:'butterfly', name:'Supine Butterfly（仰卧蝴蝶式）', sets:1, reps:3, type:'hold', holdSecs:25,
    cue:'脚掌相对，膝盖向两侧自然下沉。',
    desc:'仰卧，双脚脚掌相对、膝盖向两侧打开成蝴蝶状，让膝盖在重力下自然下沉，放松髋部和大腿内侧。每次保持 20–30 秒，配合深呼吸。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><circle cx="26" cy="76" r="7"/><line x1="33" y1="78" x2="92" y2="76"/><line x1="92" y1="76" x2="74" y2="58"/><line x1="74" y1="58" x2="86" y2="44"/><line x1="92" y1="76" x2="110" y2="58"/><line x1="110" y1="58" x2="98" y2="44"/><line x1="86" y1="44" x2="98" y2="44"/></svg>` },
  { id:'catcamel', name:'Cat Camel（猫驼式 / 猫牛式）', sets:2, reps:10, type:'reps', repSecs:4,
    cue:'吸气塌腰抬头，呼气拱背低头。',
    desc:'四点跪姿。吸气时塌腰、抬头、臀部上翘（牛式）；呼气时拱背、低头、收腹（猫式）。一拱一塌算一次，动作缓慢跟着呼吸走。',
    img:`<svg class="pose" viewBox="0 0 160 100"><line class="floor" x1="8" y1="84" x2="152" y2="84"/><path d="M58 52 q26 -22 50 0"/><circle cx="116" cy="50" r="7"/><line x1="58" y1="52" x2="56" y2="84"/><line x1="108" y1="52" x2="110" y2="84"/></svg>` },
];

const PLAN_KEY='ptPlan', STORE='ptDaily', HIST_KEY='ptHistory';
const todayKey=new Date().toISOString().slice(0,10);
const baseById=id=>BASE.find(e=>e.id===id);

function loadPlan(){
  try{ const p=JSON.parse(localStorage.getItem(PLAN_KEY)||'null');
    if(p&&Array.isArray(p.order)) return {order:p.order,custom:p.custom||{}}; }catch(e){}
  return {order:BASE.map(e=>e.id),custom:{}};
}
let plan=loadPlan();
function savePlan(){ localStorage.setItem(PLAN_KEY,JSON.stringify(plan)); }
function planList(){
  let ids=plan.order.filter(id=>baseById(id));
  BASE.forEach(b=>{ if(!ids.includes(b.id)) ids.push(b.id); });
  plan.order=ids;
  return ids.map(id=>{ const b=baseById(id), c=plan.custom[id]||{};
    return {...b, sets:c.sets??b.sets, reps:c.reps??b.reps}; });
}
const REST=12;
function estSeconds(ex){
  if(ex.type==='hold') return ex.sets*ex.reps*(ex.holdSecs||25)+ex.reps*4+6;
  return ex.sets*ex.reps*(ex.repSecs||3)+Math.max(0,ex.sets-1)*REST+8;
}
function fmtMin(sec){ const m=Math.max(1,Math.round(sec/60)); return `约 ${m} 分钟`; }
function totalEst(){ return planList().reduce((a,e)=>a+estSeconds(e),0); }

function load(){ try{ const r=JSON.parse(localStorage.getItem(STORE)||'{}'); if(r.date===todayKey) return r.done||{}; }catch(e){} return {}; }
let doneState=load();
function loadHist(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)||'{}'); }catch(e){ return {}; } }
let history=loadHist();
function recordHistory(){
  const list=planList(), total=list.length, done=list.filter(e=>doneState[e.id]).length;
  if(done>0) history[todayKey]={done,total}; else delete history[todayKey];
  localStorage.setItem(HIST_KEY,JSON.stringify(history));
}
function save(){ localStorage.setItem(STORE,JSON.stringify({date:todayKey,done:doneState})); recordHistory(); }

const d=new Date();
const wd=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
document.getElementById('today').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · ${wd}`;

const SEARCH={
  birddog:'bird dog exercise',
  happybaby:'happy baby pose yoga',
  breathing:'diaphragmatic breathing exercise',
  childpose:"child's pose side stretch yoga",
  squats:'bodyweight squat exercise form',
  sumosquat:'sumo squat exercise',
  clamshells:'clamshell exercise glute',
  hipadduction:'side lying hip adduction exercise',
  butterfly:'supine butterfly stretch',
  catcamel:'cat camel exercise'
};
function mediaBtns(ex){
  const q=encodeURIComponent(SEARCH[ex.id]||ex.name);
  return `<div class="media">`+
    `<a href="https://www.google.com/search?tbm=isch&q=${q}" target="_blank" rel="noopener">🔍 真人图片</a>`+
    `<a href="https://www.youtube.com/results?search_query=${q}" target="_blank" rel="noopener">🎬 视频示范</a>`+
  `</div>`;
}

/* ---------- 今天 ---------- */
const list=document.getElementById('list');
function renderToday(){
  const items=planList();
  list.innerHTML='';
  items.forEach(ex=>{
    const card=document.createElement('div');
    card.className='ex'+(doneState[ex.id]?' done':'');
    card.dataset.id=ex.id;
    const metaText=`${ex.sets} 组 × ${ex.reps} ${ex.type==='reps'?'次':'次保持'}`;
    let toolsHTML='';
    if(ex.type==='reps'){
      toolsHTML=`
        <div class="tool"><div class="tool-label">次数计数</div>
          <div class="counter-row"><button class="cbtn" data-act="dec">–</button>
          <div class="cval"><span class="rc">0</span><small>/${ex.reps}</small></div>
          <button class="cbtn" data-act="inc">+</button></div></div>
        <div class="tool"><div class="tool-label">组数</div>
          <div class="counter-row"><button class="cbtn" data-act="sdec">–</button>
          <div class="cval"><span class="sc">0</span><small>/${ex.sets}</small></div>
          <button class="cbtn" data-act="sinc">+</button></div></div>`;
    } else {
      toolsHTML=`
        <div class="tool" style="flex-basis:100%"><div class="tool-label">保持计时</div>
          <div class="timer-val tv">00:30</div>
          <div class="tbtns"><button class="tbtn" data-act="tstart">开始</button>
          <button class="tbtn ghost" data-act="treset">重置</button></div></div>`;
    }
    card.innerHTML=`
      <div class="ex-head">
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-meta">${metaText}</div></div>
        <div class="chev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="ex-body"><div class="ex-body-inner">
        ${ex.img}
        ${mediaBtns(ex)}
        <div class="ex-desc">${ex.desc}</div>
        <div class="tools">${toolsHTML}</div>
        <button class="done-btn" data-done>${doneState[ex.id]?'已完成 ✓ 点击取消':'标记为完成'}</button>
      </div></div>`;
    list.appendChild(card);

    card.querySelector('.ex-head').addEventListener('click',()=>card.classList.toggle('open'));
    card.querySelector('[data-done]').addEventListener('click',e=>{
      e.stopPropagation();
      doneState[ex.id]=!doneState[ex.id];
      card.classList.toggle('done',doneState[ex.id]);
      e.target.textContent=doneState[ex.id]?'已完成 ✓ 点击取消':'标记为完成';
      save(); updateProgress();
    });
    if(ex.type==='reps'){
      let r=0,s=0; const rc=card.querySelector('.rc'),sc=card.querySelector('.sc');
      card.querySelectorAll('.cbtn').forEach(btn=>btn.addEventListener('click',e=>{
        e.stopPropagation(); const a=btn.dataset.act;
        if(a==='inc'){ r++; if(r>ex.reps){ r=0; if(s<ex.sets){ s++; sc.textContent=s; } } }
        if(a==='dec') r=Math.max(0,r-1);
        if(a==='sinc') s=Math.min(ex.sets,s+1);
        if(a==='sdec') s=Math.max(0,s-1);
        rc.textContent=r; sc.textContent=s;
      }));
    } else {
      let secs=30,timerId=null; const tv=card.querySelector('.tv');
      const fmt=x=>`00:${String(x).padStart(2,'0')}`;
      card.querySelectorAll('.tbtn').forEach(btn=>btn.addEventListener('click',e=>{
        e.stopPropagation(); const a=btn.dataset.act;
        if(a==='tstart'){
          if(timerId){ clearInterval(timerId); timerId=null; btn.textContent='开始'; return; }
          btn.textContent='暂停';
          timerId=setInterval(()=>{ secs--; tv.textContent=fmt(Math.max(0,secs));
            if(secs<=0){ clearInterval(timerId); timerId=null; btn.textContent='开始'; secs=30;
              tv.textContent='完成 ✓'; if(navigator.vibrate) navigator.vibrate(200);
              setTimeout(()=>tv.textContent=fmt(30),1500); } },1000);
        }
        if(a==='treset'){ clearInterval(timerId); timerId=null; secs=30; tv.textContent=fmt(30);
          card.querySelector('[data-act="tstart"]').textContent='开始'; }
      }));
    }
  });
  updateProgress();
}
function updateProgress(){
  const items=planList(), total=items.length, done=items.filter(e=>doneState[e.id]).length;
  document.getElementById('pcount').textContent=`${done} / ${total}`;
  document.getElementById('pfill').style.width=total?(done/total*100)+'%':'0%';
  document.getElementById('alldone').style.display=(total&&done===total)?'block':'none';
  document.getElementById('estLine').textContent='今日预计完成时间 '+fmtMin(totalEst());
}
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(confirm('确定重置今天所有打卡？')){ doneState={}; save(); renderToday(); }
});

/* ---------- 计划 ---------- */
const planListEl=document.getElementById('planList');
function renderPlan(){
  const items=planList();
  document.getElementById('planTotal').textContent='整套预计 '+fmtMin(totalEst());
  planListEl.innerHTML='';
  items.forEach((ex,idx)=>{
    const row=document.createElement('div');
    row.className='plan-row';
    row.innerHTML=`
      <div class="plan-top">
        <div class="mv">
          <button data-mv="up" ${idx===0?'disabled':''}>▲</button>
          <button data-mv="down" ${idx===items.length-1?'disabled':''}>▼</button>
        </div>
        <div class="plan-name">${ex.name}<div class="plan-type">${ex.type==='reps'?'重复动作':'保持/拉伸'} · ≈${fmtMin(estSeconds(ex))}</div></div>
      </div>
      <div class="plan-edit">
        <div class="pe-group"><span class="lbl">组数</span>
          <button class="sbtn" data-ed="sdec">−</button><span class="pe-val sv">${ex.sets}</span><button class="sbtn" data-ed="sinc">+</button></div>
        <div class="pe-group"><span class="lbl">${ex.type==='reps'?'次数':'保持次'}</span>
          <button class="sbtn" data-ed="rdec">−</button><span class="pe-val rv">${ex.reps}</span><button class="sbtn" data-ed="rinc">+</button></div>
      </div>`;
    planListEl.appendChild(row);

    const cur=()=>plan.custom[ex.id]||(plan.custom[ex.id]={});
    row.querySelector('[data-mv="up"]').addEventListener('click',()=>moveItem(ex.id,-1));
    row.querySelector('[data-mv="down"]').addEventListener('click',()=>moveItem(ex.id,1));
    const sv=row.querySelector('.sv'), rv=row.querySelector('.rv'), et=row.querySelector('.plan-type');
    const refresh=()=>{ const c=plan.custom[ex.id]||{}; const eff={...ex,sets:c.sets??ex.sets,reps:c.reps??ex.reps};
      et.textContent=(ex.type==='reps'?'重复动作':'保持/拉伸')+' · ≈'+fmtMin(estSeconds(eff));
      document.getElementById('planTotal').textContent='整套预计 '+fmtMin(totalEst()); };
    row.querySelector('[data-ed="sinc"]').addEventListener('click',()=>{ const c=cur(); c.sets=Math.min(9,(c.sets??ex.sets)+1); sv.textContent=c.sets; savePlan(); refresh(); });
    row.querySelector('[data-ed="sdec"]').addEventListener('click',()=>{ const c=cur(); c.sets=Math.max(1,(c.sets??ex.sets)-1); sv.textContent=c.sets; savePlan(); refresh(); });
    row.querySelector('[data-ed="rinc"]').addEventListener('click',()=>{ const c=cur(); c.reps=Math.min(50,(c.reps??ex.reps)+1); rv.textContent=c.reps; savePlan(); refresh(); });
    row.querySelector('[data-ed="rdec"]').addEventListener('click',()=>{ const c=cur(); c.reps=Math.max(1,(c.reps??ex.reps)-1); rv.textContent=c.reps; savePlan(); refresh(); });
  });
}
function moveItem(id,dir){
  const ids=planList().map(e=>e.id);
  const i=ids.indexOf(id), j=i+dir;
  if(j<0||j>=ids.length) return;
  [ids[i],ids[j]]=[ids[j],ids[i]];
  plan.order=ids; savePlan(); renderPlan();
}
document.getElementById('planReset').addEventListener('click',()=>{
  if(confirm('恢复成默认的练习顺序和组数次数？（不影响打卡记录）')){
    plan={order:BASE.map(e=>e.id),custom:{}}; savePlan(); renderPlan();
  }
});

/* ---------- 进度 ---------- */
function dstr(dt){ return dt.toISOString().slice(0,10); }
function renderProgress(){
  // stats
  let total=Object.keys(history).length;
  const now=new Date(), ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let month=Object.keys(history).filter(k=>k.startsWith(ym)).length;
  // streak of full days
  let streak=0; let cur=new Date();
  const isFull=k=>history[k]&&history[k].done>=history[k].total&&history[k].total>0;
  if(!isFull(dstr(cur))) cur.setDate(cur.getDate()-1);
  while(isFull(dstr(cur))){ streak++; cur.setDate(cur.getDate()-1); }
  document.getElementById('stStreak').textContent=streak;
  document.getElementById('stMonth').textContent=month;
  document.getElementById('stTotal').textContent=total;

  // calendar: 5 weeks, Monday start
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['一','二','三','四','五','六','日'].forEach(h=>{
    const c=document.createElement('div'); c.className='cal-h'; c.textContent=h; grid.appendChild(c);
  });
  const t=new Date(); t.setHours(0,0,0,0);
  const monIdx=(t.getDay()+6)%7;
  const start=new Date(t); start.setDate(t.getDate()-monIdx-28);
  for(let i=0;i<35;i++){
    const dt=new Date(start); dt.setDate(start.getDate()+i);
    const k=dstr(dt);
    const cell=document.createElement('div'); cell.className='cell';
    if(dt>t){ cell.classList.add('empty'); grid.appendChild(cell); continue; }
    const h=history[k];
    if(h&&h.total){
      const ratio=h.done/h.total;
      if(ratio>=1) cell.style.background='#43b97f';
      else cell.style.background=`rgba(58,143,214,${(.35+.5*ratio).toFixed(2)})`;
      if(ratio>=1||ratio>0) cell.style.color='#fff';
    }
    cell.textContent=dt.getDate();
    if(k===todayKey) cell.classList.add('today');
    cell.title=h?`${k}：完成 ${h.done}/${h.total}`:`${k}：未打卡`;
    grid.appendChild(cell);
  }
}

/* ---------- 导航 ---------- */
const views={today:document.getElementById('view-today'),plan:document.getElementById('view-plan'),progress:document.getElementById('view-progress')};
const titles={today:'今日康复练习 🧘',plan:'练习计划 ⚙️',progress:'我的进度 📈'};
function show(v){
  Object.keys(views).forEach(k=>views[k].classList.toggle('active',k===v));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('vtitle').textContent=titles[v];
  if(v==='today') renderToday();
  if(v==='plan') renderPlan();
  if(v==='progress') renderProgress();
}
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>show(b.dataset.view)));

/* ---------- 语音引导 ---------- */
const overlay=document.getElementById('overlay');
const gStep=document.getElementById('gStep'),gName=document.getElementById('gName'),
      gSub=document.getElementById('gSub'),gPose=document.getElementById('gPose'),
      gCount=document.getElementById('gCount'),gSet=document.getElementById('gSet'),
      gPause=document.getElementById('gPause');
const guide={running:false,paused:false,cancel:false,skip:false};
let chosenVoice=null;
function pickVoice(){
  try{
    const vs=speechSynthesis.getVoices()||[];
    const zh=vs.filter(v=>/^zh|cmn|chinese/i.test(v.lang)||/普通话|中文|国语/.test(v.name));
    const score=v=>{ let s=0; const n=(v.name||'').toLowerCase();
      if(n.includes('google')) s+=6;
      if(/enhanced|premium|natural|siri|neural/i.test(v.name)) s+=5;
      if(/ting|mei|yu|sin|li/i.test(n)) s+=2;
      if(/compact|eloquence/i.test(n)) s-=4;
      if((v.lang||'').toLowerCase()==='zh-cn') s+=1; return s; };
    zh.sort((a,b)=>score(b)-score(a));
    chosenVoice=zh[0]||null;
  }catch(e){}
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){
  return new Promise(res=>{
    if(!('speechSynthesis' in window)){ setTimeout(res,350); return; }
    try{ const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.95; u.pitch=1.02;
      if(chosenVoice) u.voice=chosenVoice; u.onend=res; u.onerror=res; speechSynthesis.speak(u); }
    catch(e){ res(); }
  });
}
function wait(ms){
  return new Promise(res=>{ let el=0; const step=100;
    const iv=setInterval(()=>{ if(guide.cancel||guide.skip){ clearInterval(iv); res(); return; }
      if(guide.paused) return; el+=step; if(el>=ms){ clearInterval(iv); res(); } },step);
  });
}
async function runGuide(){
  guide.running=true; guide.cancel=false; guide.paused=false; gPause.textContent='暂停';
  overlay.classList.add('show');
  const seq=planList();
  await speak('开始今天的康复练习，跟我一起做');
  for(let i=0;i<seq.length;i++){
    if(guide.cancel) break;
    guide.skip=false; const ex=seq[i];
    gStep.textContent=`第 ${i+1} / ${seq.length} 个`;
    gName.textContent=ex.name; gSub.textContent=`${ex.sets} 组 × ${ex.reps} ${ex.type==='reps'?'次':'次保持'}`;
    gPose.innerHTML=ex.img; gCount.textContent=''; gSet.textContent='';
    await speak(ex.name);
    if(!guide.skip&&!guide.cancel) await speak(`${ex.sets}组，每组${ex.reps}${ex.type==='hold'?'次保持':'次'}。${ex.cue}`);
    for(let s=1;s<=ex.sets&&!guide.cancel&&!guide.skip;s++){
      gSet.textContent=`第 ${s} / ${ex.sets} 组`;
      if(ex.sets>1&&!guide.skip&&!guide.cancel) await speak(`第${s}组`);
      for(let r=1;r<=ex.reps&&!guide.cancel&&!guide.skip;r++){
        if(ex.type==='hold'){
          gCount.textContent='保持'; await speak(`第${r}次，保持`);
          let left=ex.holdSecs||25;
          while(left>0&&!guide.cancel&&!guide.skip){ gCount.textContent=left; await wait(1000); left--; }
          if(!guide.skip&&!guide.cancel){ gCount.textContent='放松'; await speak('放松'); }
        } else {
          gCount.textContent=r; await speak(String(r));
          await wait(Math.max(400,(ex.repSecs||3)*1000-700));
        }
      }
      if(s<ex.sets&&!guide.cancel&&!guide.skip){ gCount.textContent='休息'; await speak('休息一下'); await wait(12000); }
    }
    if(!guide.cancel){ doneState[ex.id]=true; save(); await speak('很好，完成'); }
  }
  if(!guide.cancel) await speak('全部练习完成，太棒了！');
  endGuide();
}
function endGuide(){
  guide.running=false; guide.cancel=true;
  try{ speechSynthesis.cancel(); }catch(e){}
  overlay.classList.remove('show');
  renderToday();
}
document.getElementById('startGuide').addEventListener('click',()=>{
  if(guide.running) return;
  try{ speechSynthesis.cancel(); const w=new SpeechSynthesisUtterance(' '); w.lang='zh-CN'; speechSynthesis.speak(w); }catch(e){}
  runGuide();
});
gPause.addEventListener('click',()=>{
  guide.paused=!guide.paused; gPause.textContent=guide.paused?'继续':'暂停';
  try{ guide.paused?speechSynthesis.pause():speechSynthesis.resume(); }catch(e){}
});
document.getElementById('gSkip').addEventListener('click',()=>{ guide.skip=true; try{ speechSynthesis.cancel(); }catch(e){} });
document.getElementById('gStop').addEventListener('click',endGuide);

recordHistory();
show('today');
</script>
